<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chef's Table - Recipe Website</title>
  <style>
    :root {
      --bg: #faf9f6;
      --card: #fffff;
      --accent: #e67e22;
      --accent2: #d35400;
      --text: #2c3e50;
      --muted: #7f8c8d;
      --border: #e5e5e5;
      --green: #27ae60;
      --red: #e74c3c;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .recipe-app {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 2px 10px rgba(230,126,34,0.3);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 0.4rem 1rem;
      min-width: 280px;
      backdrop-filter: blur(4px);
    }

    .search-bar input {
      background: transparent;
      border: none;
      color: white;
      font-size: 0.95rem;
      outline: none;
      width: 100%;
      margin-left: 0.5rem;
    }

    .search-bar input::placeholder { color: rgba(255,255,255,0.7); }

    .nav-links {
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }

    .nav-links a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
      font-size: 0.95rem;
    }

    .nav-links a:hover, .nav-links a.active { color: white; text-decoration: underline; }

    /* Main Layout */
    .main-layout {
      display: flex;
      gap: 2rem;
      padding: 2rem;
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
    }

    .sidebar h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }

    .cat-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .cat-list li {
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.95rem;
    }

    .cat-list li:hover { background: #f0f0f0; }
    .cat-list li.active { background: var(--accent); color: white; }

    .content-area {
      flex: 1;
      min-width: 0;
    }

    .section-title {
      font-size: 1.4rem;
      margin: 0 0 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* Recipe Card */
    .recipe-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }

    .recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }

    .card-img {
      height: 160px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .card-fav {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.9);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.2s;
    }

    .card-fav:hover { transform: scale(1.1); }
    .card-fav.liked { color: var(--red); }

    .card-body {
      padding: 1rem;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0 0 0.4rem;
      line-height: 1.3;
    }

    .card-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .card-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .card-rating {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.85rem;
    }

    .stars { color: #f1c40f; }

    /* Recipe Detail */
    .detail-view {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-hero {
      height: 300px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .detail-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent 60%);
      display: flex;
      align-items: flex-end;
      padding: 2rem;
      color: white;
    }

    .detail-hero-content h1 {
      font-size: 2.2rem;
      margin: 0 0 0.5rem;
    }

    .detail-hero-content .meta-row {
      display: flex;
      gap: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.9;
      flex-wrap: wrap;
    }

    .detail-body {
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2.5rem;
    }

    @media (max-width: 900px) {
      .detail-body { grid-template-columns: 1fr; }
      .main-layout { flex-direction: column; }
      .sidebar { width: 100%; }
    }

    .detail-section h2 {
      font-size: 1.2rem;
      margin: 0 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
    }

    .ingredients-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .ingredients-list li {
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .ingredients-list li::before {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      flex-shrink: 0;
    }

    .steps-list {
      counter-reset: step;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .steps-list li {
      position: relative;
      padding-left: 3rem;
      padding-bottom: 1.5rem;
      border-left: 2px solid var(--border);
      margin-left: 1rem;
    }

    .steps-list li::before {
      counter-increment: step;
      content: counter(step);
      position: absolute;
      left: -1rem;
      top: 0;
      width: 2rem;
      height: 2rem;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .steps-list li:last-child { border-left: 2px solid transparent; }

    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
    }

    .nutri-item {
      background: #f8f9fa;
      padding: 0.8rem;
      border-radius: 10px;
      text-align: center;
    }

    .nutri-value {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    .nutri-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    .reviews-section {
      margin-top: 2rem;
    }

    .review-card {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 0.8rem;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.4rem;
    }

    .review-author {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .review-date {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .review-text {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.5;
    }

    .add-review {
      margin-top: 1rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 12px;
    }

    .add-review textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 80px;
      box-sizing: border-box;
    }

    .star-rating-input {
      display: flex;
      gap: 0.3rem;
      margin: 0.5rem 0;
      font-size: 1.4rem;
      cursor: pointer;
    }

    .star-rating-input span { transition: transform 0.1s; }
    .star-rating-input span:hover { transform: scale(1.2); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-secondary { background: #ecf0f1; color: var(--text); }
    .btn-secondary:hover { background: #d5dbdb; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1rem;
      cursor: pointer;
      color: var(--accent);
      font-weight: 600;
    }

    .back-btn:hover { text-decoration: underline; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-state h3 { color: var(--text); margin-bottom: 0.5rem; }

    .hidden { display: none !important; }

    .upload-form {
      background: var(--card);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
      max-width: 600px;
      margin: 0 auto;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(3px);
    }

    .login-overlay.show { display: flex; }

    .login-box {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .login-box h2 { margin: 0 0 1.5rem; text-align: center; }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: white;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--text);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 200;
      font-size: 0.95rem;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 600px) {
      .header { padding: 1rem; }
      .search-bar { min-width: 100%; order: 3; }
      .main-layout { padding: 1rem; }
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="recipe-app" id="recipeApp">
    <!-- Header -->
    <header class="header">
      <div class="logo">🍳 Chef's Table</div>
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search recipes, ingredients..." oninput="handleSearch(this.value)">
      </div>
      <nav class="nav-links">
        <a onclick="showView('home')" id="navHome" class="active">Home</a>
        <a onclick="showView('favorites')" id="navFav">Favorites ❤️</a>
        <a onclick="showView('upload')" id="navUpload">Upload</a>
        <a onclick="toggleLogin()" id="navLogin">Login</a>
        <div class="user-avatar hidden" id="userAvatar" onclick="toggleLogin()">U</div>
      </nav>
    </header>

    <!-- Main Content -->
    <div class="main-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <h3>Categories</h3>
        <ul class="cat-list" id="categoryList">
          <li class="active" onclick="filterCategory('all')">🍽️ All Recipes</li>
          <li onclick="filterCategory('Breakfast')">🥞 Breakfast</li>
          <li onclick="filterCategory('Lunch')">🥗 Lunch</li>
          <li onclick="filterCategory('Dinner')">🍝 Dinner</li>
          <li onclick="filterCategory('Dessert')">🍰 Dessert</li>
          <li onclick="filterCategory('Snack')">🍿 Snacks</li>
          <li onclick="filterCategory('Beverage')">🥤 Beverages</li>
          <li onclick="filterCategory('Healthy')">🥑 Healthy</li>
        </ul>
      </aside>

      <!-- Content Area -->
      <div class="content-area" id="contentArea">
        <!-- Home View -->
        <div id="homeView">
          <div class="section-title">
            <span id="listTitle">All Recipes</span>
            <span style="font-size:0.9rem;color:var(--muted);" id="resultCount">8 recipes</span>
          </div>
          <div class="recipe-grid" id="recipeGrid"></div>
        </div>

        <!-- Detail View -->
        <div id="detailView" class="hidden">
          <div class="back-btn" onclick="showView('home')">← Back to recipes</div>
          <div class="detail-view" id="detailContent"></div>
        </div>

        <!-- Favorites View -->
        <div id="favoritesView" class="hidden">
          <div class="section-title">Your Favorites ❤️</div>
          <div class="recipe-grid" id="favGrid"></div>
        </div>

        <!-- Upload View -->
        <div id="uploadView" class="hidden">
          <div class="section-title">Upload New Recipe</div>
          <div class="upload-form">
            <div class="form-row">
              <div class="form-group">
                <label>Recipe Name</label>
                <input type="text" id="upName" placeholder="e.g. Classic Margherita">
              </div>
              <div class="form-group">
                <label>Category</label>
                <select id="upCategory">
                  <option>Breakfast</option>
                  <option>Lunch</option>
                  <option>Dinner</option>
                  <option>Dessert</option>
                  <option>Snack</option>
                  <option>Beverage</option>
                  <option>Healthy</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Prep Time (mins)</label>
                <input type="number" id="upPrep" placeholder="15">
              </div>
              <div class="form-group">
                <label>Cook Time (mins)</label>
                <input type="number" id="upCook" placeholder="30">
              </div>
            </div>
            <div class="form-group">
              <label>Ingredients (one per line)</label>
              <textarea id="upIngredients" rows="4" placeholder="2 cups flour
1 tsp salt
..."></textarea>
            </div>
            <div class="form-group">
              <label>Instructions (one step per line)</label>
              <textarea id="upSteps" rows="5" placeholder="Preheat oven to 350°F
Mix dry ingredients...
"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Calories</label>
                <input type="number" id="upCal" placeholder="450">
              </div>
              <div class="form-group">
                <label>Protein (g)</label>
                <input type="number" id="upProtein" placeholder="20">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Carbs (g)</label>
                <input type="number" id="upCarbs" placeholder="55">
              </div>
              <div class="form-group">
                <label>Fat (g)</label>
                <input type="number" id="upFat" placeholder="18">
              </div>
            </div>
            <button class="btn" onclick="submitRecipe()" style="width:100%;">📤 Upload Recipe</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Login Overlay -->
    <div class="login-overlay" id="loginOverlay" onclick="if(event.target===this)toggleLogin()">
      <div class="login-box">
        <h2>👤 Login</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUser" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPass" placeholder="••••••••">
        </div>
        <button class="btn" onclick="doLogin()" style="width:100%;margin-top:0.5rem;">Sign In</button>
        <p style="text-align:center;color:var(--muted);font-size:0.85rem;margin-top:1rem;">Demo: user / password</p>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

      {

        image: "https://images.unsplash.com/photo-1624353365286-3f8d62daad51?w=600&h=400&fit=crop",

      },
      {
        id: 6, title: "Grilled Chicken Caesar Salad", category: "Lunch",
        image: "https://images.unsplash.com/photo-1550304943-4f24f54ddde9?w=600&h=400&fit=crop",
        prepTime: 15, cookTime: 12, servings: 2, rating: 4.5, reviews: 78,

        nutrition: { calories: 350, protein: 38, carbs: 14, fat: 16 },
        reviewsList: [{author: "Chris B.", date: "1 week ago", rating: 4, text: "Light and satisfying. Homemade croutons make a difference!"}]
      },
      {
        id: 7, title: "Mango Lassi", category: "Beverage",
        image: "https://images.unsplash.com/photo-1626202269383-4f8784e7a6b2?w=600&h=400&fit=crop",
        prepTime: 5, cookTime: 0, servings: 2, rating: 4.8, reviews: 45,

        nutrition: { calories: 180, protein: 6, carbs: 32, fat: 4 },
        reviewsList: [{author: "Priya S.", date: "4 days ago", rating: 5, text: "Just like my grandmother makes! Refreshing and creamy."}]
      },
      {
        id: 8, title: "Crispy Baked Falafel", category: "Snack",
        image: "https://images.unsplash.com/photo-1547058881-aa042a6207de?w=600&h=400&fit=crop",
        prepTime: 20, cookTime: 25, servings: 4, rating: 4.6, reviews: 67,
        ingredients: ["2 cups dried chickpeas, soaked overnight", "1/2 onion, chopped", "4 garlic cloves", "1/2 cup fresh parsley", "1/2 cup fresh cilantro", "1 tsp cumin", "1 tsp coriander", "1/2 tsp baking soda", "Salt and pepper", "Olive oil spray"],
        steps: ["Drain and rinse soaked chickpeas.", "Blend chickpeas, onion, garlic, herbs, and spices in a food processor.", "Form mixture into small patties.", "Place on a baking sheet lined with parchment.", "Spray lightly with olive oil.", "Bake at 400°F (200°C) for 25 minutes, flipping halfway.", "Serve with tahini sauce and pita bread."],
        nutrition: { calories: 240, protein: 10, carbs: 28, fat: 10 },
        reviewsList: [{author: "Omar F.", date: "6 days ago", rating: 5, text: "Crispy outside, fluffy inside. Perfect baked falafel!"}]
      }
    ];

    // ==========================
    // State
    // ==========================
    let currentView = 'home';
    let currentCategory = 'all';
    let searchQuery = '';
    let favorites = new Set();
    let currentUser = null;
    let currentRecipeId = null;

    // ==========================
    // Render Functions
    // ==========================
    function renderRecipes(targetGrid, recipeList) {
      const grid = document.getElementById(targetGrid);
      if (!recipeList.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>No recipes found</h3><p>Try adjusting your search or category filter.</p></div>`;
        return;
      }
      grid.innerHTML = recipeList.map(r => `
        <div class="recipe-card" onclick="openRecipe(${r.id})">
          <div class="card-img" style="background-image:url('${r.image}')">
            <span class="card-badge">${r.category}</span>
            <button class="card-fav ${favorites.has(r.id) ? 'liked' : ''}" onclick="event.stopPropagation();toggleFav(${r.id})">
              ${favorites.has(r.id) ? '❤️' : '🤍'}
            </button>
          </div>
          <div class="card-body">
            <div class="card-title">${r.title}</div>
            <div class="card-meta">
              <span>⏱️ ${r.prepTime + r.cookTime} min</span>
              <span>🍽️ ${r.servings} srv</span>
            </div>
            <div class="card-rating">
              <span class="stars">${'★'.repeat(Math.floor(r.rating))}${'☆'.repeat(5 - Math.floor(r.rating))}</span>
              <span>${r.rating} (${r.reviews})</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function getFilteredRecipes() {
      let list = recipes;
      if (currentCategory !== 'all') {
        list = list.filter(r => r.category === currentCategory);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        list = list.filter(r => 
          r.title.toLowerCase().includes(q) ||
          r.ingredients.some(i => i.toLowerCase().includes(q))
        );
      }
      return list;
    }

    function refreshHome() {
      const list = getFilteredRecipes();
      renderRecipes('recipeGrid', list);
      document.getElementById('listTitle').textContent = currentCategory === 'all' ? 'All Recipes' : currentCategory + ' Recipes';
      document.getElementById('resultCount').textContent = list.length + ' recipe' + (list.length !== 1 ? 's' : '');
    }

    function refreshFavorites() {
      const favs = recipes.filter(r => favorites.has(r.id));
      renderRecipes('favGrid', favs);
    }

    // ==========================
    // Navigation
    // ==========================
    function showView(view) {
      currentView = view;
      document.getElementById('homeView').classList.toggle('hidden', view !== 'home');
      document.getElementById('detailView').classList.toggle('hidden', view !== 'detail');
      document.getElementById('favoritesView').classList.toggle('hidden', view !== 'favorites');
      document.getElementById('uploadView').classList.toggle('hidden', view !== 'upload');
      document.getElementById('sidebar').classList.toggle('hidden', view !== 'home');

      document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
      if (view === 'home') document.getElementById('navHome').classList.add('active');
      if (view === 'favorites') document.getElementById('navFav').classList.add('active');
      if (view === 'upload') document.getElementById('navUpload').classList.add('active');

      if (view === 'home') refreshHome();
      if (view === 'favorites') refreshFavorites();
      window.scrollTo(0, 0);
    }

    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.cat-list li').forEach(li => li.classList.remove('active'));
      event.target.classList.add('active');
      refreshHome();
    }

    function handleSearch(q) {
      searchQuery = q;
      if (currentView !== 'home') showView('home');
      refreshHome();
    }

    // ==========================
    // Recipe Detail
    // ==========================
    function openRecipe(id) {
      const r = recipes.find(x => x.id === id);
      if (!r) return;
      currentRecipeId = id;

      const totalTime = r.prepTime + r.cookTime;
      const isFav = favorites.has(id);

      document.getElementById('detailContent').innerHTML = `
        <div class="detail-hero" style="background-image:url('${r.image}')">
          <div class="detail-hero-overlay">
            <div class="detail-hero-content">
              <h1>${r.title}</h1>
              <div class="meta-row">
                <span>⏱️ ${totalTime} min total</span>
                <span>🔪 Prep: ${r.prepTime}m</span>
                <span>🔥 Cook: ${r.cookTime}m</span>
                <span>🍽️ ${r.servings} servings</span>
                <span>⭐ ${r.rating} (${r.reviews} reviews)</span>
              </div>
            </div>
          </div>
        </div>
        <div class="detail-body">
          <div>
            <div class="detail-section">
              <h2>📝 Instructions</h2>
              <ol class="steps-list">
                ${r.steps.map(s => `<li>${s}</li>`).join('')}
              </ol>
            </div>
            <div class="reviews-section">
              <h2>💬 Reviews</h2>
              <div id="reviewsList">
                ${r.reviewsList.map(rv => `
                  <div class="review-card">
                    <div class="review-header">
                      <span class="review-author">${rv.author}</span>
                      <span class="review-date">${rv.date}</span>
                    </div>
                    <div class="stars" style="margin-bottom:0.3rem;">${'★'.repeat(rv.rating)}${'☆'.repeat(5-rv.rating)}</div>
                    <div class="review-text">${rv.text}</div>
                  </div>
                `).join('')}
              </div>
              <div class="add-review">
                <h3 style="margin:0 0 0.5rem;font-size:1rem;">Add Your Review</h3>
                <div class="star-rating-input" id="starInput">
                  <span onclick="setReviewStars(1)">☆</span>
                  <span onclick="setReviewStars(2)">☆</span>
                  <span onclick="setReviewStars(3)">☆</span>
                  <span onclick="setReviewStars(4)">☆</span>
                  <span onclick="setReviewStars(5)">☆</span>
                </div>
                <textarea id="reviewText" placeholder="Share your experience..."></textarea>
                <button class="btn" onclick="submitReview()" style="margin-top:0.5rem;">Submit Review</button>
              </div>
            </div>
          </div>
          <div>
            <div class="detail-section">
              <h2>🛒 Ingredients</h2>
              <ul class="ingredients-list">
                ${r.ingredients.map(ing => `<li>${ing}</li>`).join('')}
              </ul>
            </div>
            <div class="detail-section" style="margin-top:2rem;">
              <h2>🥗 Nutrition (per serving)</h2>
              <div class="nutrition-grid">
                <div class="nutri-item"><div class="nutri-value">${r.nutrition.calories}</div><div class="nutri-label">Calories</div></div>
                <div class="nutri-item"><div class="nutri-value">${r.nutrition.protein}g</div><div class="nutri-label">Protein</div></div>
                <div class="nutri-item"><div class="nutri-value">${r.nutrition.carbs}g</div><div class="nutri-label">Carbs</div></div>
                <div class="nutri-item"><div class="nutri-value">${r.nutrition.fat}g</div><div class="nutri-label">Fat</div></div>
              </div>
            </div>
            <div style="margin-top:2rem;text-align:center;">
              <button class="btn ${isFav ? 'btn-secondary' : ''}" onclick="toggleFav(${r.id});openRecipe(${r.id})" style="width:100%;">
                ${isFav ? '❤️ Remove from Favorites' : '🤍 Add to Favorites'}
              </button>
            </div>
          </div>
        </div>
      `;
      showView('detail');
    }

    // ==========================
    // Favorites
    // ==========================
    function toggleFav(id) {
      if (favorites.has(id)) {
        favorites.delete(id);
        showToast('Removed from favorites');
      } else {
        favorites.add(id);
        showToast('Added to favorites ❤️');
      }
      if (currentView === 'home') refreshHome();
      if (currentView === 'favorites') refreshFavorites();
      if (currentView === 'detail' && currentRecipeId === id) openRecipe(id);
    }

    // ==========================
    // Reviews
    // ==========================
    let reviewStars = 0;
    function setReviewStars(n) {
      reviewStars = n;
      const spans = document.querySelectorAll('#starInput span');
      spans.forEach((s, i) => s.textContent = i < n ? '★' : '☆');
    }

    function submitReview() {
      const text = document.getElementById('reviewText').value.trim();
      if (!text) { showToast('Please write a review'); return; }
      if (reviewStars === 0) { showToast('Please select a rating'); return; }

      const r = recipes.find(x => x.id === currentRecipeId);
      const name = currentUser || 'Guest User';
      r.reviewsList.unshift({ author: name, date: 'Just now', rating: reviewStars, text: text });
      r.reviews++;
      const total = r.reviewsList.reduce((sum, rv) => sum + rv.rating, 0);
      r.rating = Math.round((total / r.reviewsList.length) * 10) / 10;

      document.getElementById('reviewText').value = '';
      setReviewStars(0);
      openRecipe(currentRecipeId);
      showToast('Review submitted!');
    }

    // ==========================
    // Upload
    // ==========================
    function submitRecipe() {
      const name = document.getElementById('upName').value.trim();
      const cat = document.getElementById('upCategory').value;
      const prep = parseInt(document.getElementById('upPrep').value) || 0;
      const cook = parseInt(document.getElementById('upCook').value) || 0;
      const ingredients = document.getElementById('upIngredients').value.trim().split('\n').filter(x => x);
      const steps = document.getElementById('upSteps').value.trim().split('\n').filter(x => x);
      const cal = parseInt(document.getElementById('upCal').value) || 0;
      const protein = parseInt(document.getElementById('upProtein').value) || 0;
      const carbs = parseInt(document.getElementById('upCarbs').value) || 0;
      const fat = parseInt(document.getElementById('upFat').value) || 0;

      if (!name || !ingredients.length || !steps.length) {
        showToast('Please fill in all required fields');
        return;
      }

      const newRecipe = {
        id: Date.now(),
        title: name,
        category: cat,
        image: "https://images.unsplash.com/photo-1495521821757-a1efb6729352?w=600&h=400&fit=crop",
        prepTime: prep, cookTime: cook, servings: 4, rating: 0, reviews: 0,
        ingredients: ingredients,
        steps: steps,
        nutrition: { calories: cal, protein: protein, carbs: carbs, fat: fat },
        reviewsList: []
      };

      recipes.unshift(newRecipe);
      showToast('Recipe uploaded successfully! 🎉');
      showView('home');

      ['upName','upPrep','upCook','upIngredients','upSteps','upCal','upProtein','upCarbs','upFat'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    // ==========================
    // Login
    // ==========================
    function toggleLogin() {
      const overlay = document.getElementById('loginOverlay');
      overlay.classList.toggle('show');
    }

    function doLogin() {
      const user = document.getElementById('loginUser').value.trim();
      const pass = document.getElementById('loginPass').value;
      if (user === 'user' && pass === 'password') {
        currentUser = user;
        document.getElementById('navLogin').classList.add('hidden');
        document.getElementById('userAvatar').classList.remove('hidden');
        document.getElementById('userAvatar').textContent = user[0].toUpperCase();
        toggleLogin();
        showToast('Welcome back, ' + user + '!');
      } else {
        showToast('Invalid credentials. Try user / password');
      }
    }

    // ==========================
    // Toast
    // ==========================
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ==========================
    // Boot
    // ==========================
    refreshHome();
  </script>
</body>
</html>
